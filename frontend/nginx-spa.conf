server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — handled by Vite in dev, nginx in production
    # In Railway, VITE_API_URL is set to the full ealliance-api URL
    # so the frontend calls the API directly (no proxy needed in prod)

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
